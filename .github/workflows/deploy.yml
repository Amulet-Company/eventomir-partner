name: Deploy Partner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 15m # Next.js builds can easily timeout the default runner
          script_stop: true # Stops execution immediately if a step fails
          script: |
            # Load NVM/Node into the non-interactive SSH session
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # Go to the project directory
            cd /var/www/eventomir/partner

            # Pull latest code
            git fetch --all
            git reset --hard origin/main

            # Install and build
            npm install
            npm run build

            # Restart PM2 process
            pm2 reload partner
