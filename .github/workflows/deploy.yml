name: Deploy Partner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 20m # Increased timeout for Next.js builds
          script_stop: true
          debug: true # Enable debug mode to see SSH connection details
          script: |
            set -e  # Exit on any error
            
            # Load NVM/Node into the non-interactive SSH session
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || { echo "NVM not found"; exit 1; }
            
            # Verify Node is available
            echo "Node version: $(node -v)"
            echo "NPM version: $(npm -v)"
            
            # Go to the project directory
            cd /var/www/eventomir/partner || { echo "Directory not found"; exit 1; }
            
            # Pull latest code
            git fetch --all
            git reset --hard origin/main
            
            # Clean install and build
            npm ci  # Use npm ci instead of npm install for better reproducibility
            npm run build
            
            # Restart PM2 process (ensure PM2 is initialized)
            pm2 list  # Check PM2 status
            pm2 reload partner || pm2 start partner  # Reload if exists, start if doesn't
            pm2 save  # Save PM2 process list
